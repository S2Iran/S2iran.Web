<!DOCTYPE html>
<html lang="fa" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S2Iran • Coming Soon</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500;600&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            color: #f0d9a0;
            background: radial-gradient(circle at center, #1a1208 0%, #0a0503 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        .glow {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(255, 215, 100, 0.15) 0%, transparent 70%);
            filter: blur(80px);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1;
        }

        .container {
            text-align: center;
            z-index: 2;
            max-width: 920px;
            padding: 40px 20px;
        }

        .logo {
            width: 8000px;
            margin: 0 auto 40px;
            filter: drop-shadow(0 25px 50px rgba(255, 215, 100, 0.5));
        }

        .tagline {
            font-size: 1.45rem;
            font-weight: 300;
            color: #d4af7a;
            margin-bottom: 70px;
            line-height: 1.7;
        }

        #timer {
            font-size: 2.1rem;
            font-weight: 500;
            letter-spacing: 6px;
            color: #f0d9a0;
            text-shadow: 0 15px 35px rgba(0, 0, 0, 0.7);
            margin: 50px 0;
        }

        .coming-soon {
            font-size: 1.15rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: #b38b5d;
            margin-top: 60px;
        }

        footer {
            position: absolute;
            bottom: 35px;
            font-size: 0.95rem;
            opacity: 0.6;
            color: #b38b5d;
        }
    </style>
</head>
<body>
    <div class="glow"></div>
    
    <div class="container">
        <img src="~/S2iran_logo1.png" alt="S2Iran" class="logo">

        <p class="tagline">
            A new chapter for those who carry the heart of Iran.<br>
            Something timeless is coming.
        </p>

        <div id="timer"></div>

        <p class="coming-soon">15 August 2026 • 06:00 UTC</p>
    </div>

    <footer>
        With Love & Pride • © 2026
    </footer>

    <script>
        const targetDate = new Date("2026-08-15T06:00:00Z").getTime();

        function updateCountdown() {
            const now = new Date().getTime();
            const distance = targetDate - now;

            if (distance < 0) {
                document.getElementById("timer").innerHTML = "We Are Live";
                return;
            }

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById("timer").innerHTML = `
                ${days} days &nbsp;&nbsp; ${hours} hrs &nbsp;&nbsp; ${minutes} min &nbsp;&nbsp; ${seconds} sec
            `;
        }

        setInterval(updateCountdown, 1000);
        updateCountdown();
    </script>
</body>
</html>
