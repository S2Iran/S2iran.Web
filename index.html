<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شمارنده</title>
    <style>
        body { font-family: Tahoma; text-align: center; padding: 50px; background: #f0f0f0; }
        #timer { font-size: 3rem; font-weight: bold; color: #d32f2f; }
    </style>
</head>
<body>
    <h1>تا رویداد باقی مانده</h1>
    <div id="timer"></div>

    <script>
        // تاریخ هدف: ۴۰ روز از امروز
        const targetDate = new Date();
        targetDate.setDate(targetDate.getDate() + 40);

        function updateCountdown() {
            const now = new Date().getTime();
            const distance = targetDate - now;

            if (distance < 0) {
                document.getElementById("timer").innerHTML = "زمان تمام شد!";
                return;
            }

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById("timer").innerHTML = 
                `${days} روز و ${hours} ساعت و ${minutes} دقیقه و ${seconds} ثانیه`;
        }

        setInterval(updateCountdown, 1000);
        updateCountdown();
    </script>
</body>
</html>
